<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes e Cores</title>
    <style type="text/css">
        .fontSerife {
            font-family: 'Times New Roman', Cambria, Cochin, Georgia, Times, serif;
            font-size: 5em;
        }

        .fontSansSerife {
            font-family: 'Verdana', 'Geneva', 'DejaVu Sans', 'Bitstream Vera Sans', 'Liberation Sans', sans-serif;
            font-size: 2.5em;
        }

        .fontMonospace {
            font-family: 'Courier New', 'Monaco', 'Consolas', monospace;
            font-size: 1.25em;
        }

        h1{
            font-size: 2.5em;
        }

        h2{
            font-size: 1.875em;
        }

        p{
            font-size: 0.875em;
        }

        .conteudo{
            font-size: 30px;
        }
        </style>
</head>
<body>
    <div class="conteudo">
        <p class="fontSerife">Fonte com Serifa</p>
        <p class="fontSansSerife">Fonte sem Serifa</p>
        <p class="fontMonospace">Fonte Monoespaçada</p>
    </div>
</body>
</html>
